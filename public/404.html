<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Kreyolang</title>
    <script>
      // SPA redirect for GitHub Pages — spa-github-pages technique
      // https://github.com/rafgraph/spa-github-pages
      // pathSegmentsToKeep = 0 pour domaine personnalisé (www.kreyolang.com)
      var seg = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
