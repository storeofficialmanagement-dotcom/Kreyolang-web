<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kreyolang - Verification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #8E2DE2, #4A00E0); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; }
    .card { background: rgba(255,255,255,0.12); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 48px 36px; max-width: 380px; width: 90%; text-align: center; }
    .check { font-size: 56px; margin-bottom: 16px; display: block; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; opacity: 0.85; line-height: 1.6; margin-bottom: 32px; }
    .btn { display: inline-block; background: #fff; color: #4A00E0; font-weight: 700; font-size: 16px; padding: 16px 32px; border-radius: 14px; text-decoration: none; width: 100%; cursor: pointer; border: none; }
    .hint { margin-top: 20px; font-size: 13px; opacity: 0.6; margin-bottom: 0; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <span class="check" id="checkIcon" style="display:none">&#10003;</span>
    <h1 id="title">Redirection en cours...</h1>
    <p id="subtitle">Ouverture de Kreyolang, veuillez patienter.</p>
    <a class="btn" id="openBtn" style="display:none" href="#">Ouvrir Kreyolang</a>
    <p class="hint" id="hint" style="display:none">Si l'application ne s'ouvre pas, appuyez sur le bouton ci-dessus.</p>
  </div>
  <script>
    (function () {
      var hash = window.location.hash;
      var search = window.location.search;
      var openBtn = document.getElementById('openBtn');
      var spinner = document.getElementById('spinner');
      var checkIcon = document.getElementById('checkIcon');
      var title = document.getElementById('title');
      var subtitle = document.getElementById('subtitle');
      var hint = document.getElementById('hint');
      function showSuccess(deepLink) {
        spinner.style.display = 'none';
        checkIcon.style.display = 'block';
        title.textContent = 'Compte verifie !';
        subtitle.textContent = 'Ouverture de Kreyolang...';
        openBtn.href = deepLink;
        openBtn.style.display = 'block';
        hint.style.display = 'block';
      }
      function showError() {
        spinner.style.display = 'none';
        title.textContent = 'Lien expire';
        subtitle.textContent = 'Ce lien est invalide. Reconnecte-toi dans l application.';
      }
      if (hash && hash.includes('access_token')) {
        var dl = 'kreyolang://' + hash;
        showSuccess(dl);
        setTimeout(function () { window.location.href = dl; }, 800);
        return;
      }
      if (search && search.includes('code=')) {
        var dl2 = 'kreyolang://auth/callback' + search;
        showSuccess(dl2);
        setTimeout(function () { window.location.href = dl2; }, 800);
        return;
      }
      showError();
    })();
  </script>
</body>
</html>
