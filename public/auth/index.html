<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kreyolang</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #8E2DE2, #4A00E0);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 800; color: #1a1a2e; margin-bottom: 10px; }
    .sub { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: block; width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8E2DE2, #4A00E0);
      color: #fff; font-size: 17px; font-weight: 700;
      border: none; border-radius: 14px; cursor: pointer;
      text-decoration: none; letter-spacing: 0.3px;
    }
    .hint { margin-top: 14px; font-size: 13px; color: #999; line-height: 1.5; }
    .hint strong { color: #555; }
    .err { display: none; margin-top: 14px; font-size: 13px; color: #e53e3e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">&#10003;&#65039;</div>
    <h1 id="title">Email confirm&#233; !</h1>
    <p class="sub" id="sub">Appuyez sur le bouton pour continuer dans Kreyolang.</p>
    <a id="btn" class="btn" href="#">Ouvrir Kreyolang &rarr;</a>
    <p class="hint" id="hint">
      iOS va vous demander de confirmer &mdash;<br/>
      appuyez simplement sur <strong>&laquo;&nbsp;Autoriser&nbsp;&raquo;</strong>.
    </p>
    <p class="err" id="err">Kreyolang ne semble pas install&#233; sur cet appareil.</p>
  </div>
  <script>
    (function () {
      var hash   = window.location.hash.slice(1);
      var search = window.location.search.slice(1);
      var hp = new URLSearchParams(hash);
      var qp = new URLSearchParams(search);

      var error = hp.get('error') || qp.get('error');
      if (error) {
        document.getElementById('icon').textContent = '\u26a0\ufe0f';
        document.getElementById('title').textContent = 'Lien expir\u00e9';
        document.getElementById('sub').textContent = 'Ce lien n\'est plus valide. Demandez un nouveau lien depuis l\'app.';
        document.getElementById('btn').style.display = 'none';
        document.getElementById('hint').style.display = 'none';
        return;
      }

      var code         = qp.get('code');
      var accessToken  = hp.get('access_token') || qp.get('access_token');
      var refreshToken = hp.get('refresh_token') || qp.get('refresh_token');

      var deepLink;
      if (code) {
        deepLink = 'kreyolang://auth/callback?code=' + encodeURIComponent(code);
      } else if (accessToken && refreshToken) {
        deepLink = 'kreyolang://#' + hash;
      } else {
        document.getElementById('icon').textContent = '\u26a0\ufe0f';
        document.getElementById('title').textContent = 'Lien invalide';
        document.getElementById('sub').textContent = 'Ce lien ne contient pas de donn\u00e9es valides.';
        document.getElementById('btn').style.display = 'none';
        document.getElementById('hint').style.display = 'none';
        return;
      }

      var btn = document.getElementById('btn');
      btn.href = deepLink;
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = deepLink;
        setTimeout(function () {
          document.getElementById('err').style.display = 'block';
        }, 3000);
      });
    })();
  </script>
</body>
</html>
